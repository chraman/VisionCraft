version: '3.9'

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ai-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d aiplatform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Node.js Services (stubs) ─────────────────────────────────────────────

  api-gateway:
    image: node:20-alpine
    container_name: ai-platform-api-gateway
    restart: unless-stopped
    environment:
      PORT: '3000'
      SERVICE_NAME: api-gateway
      NODE_ENV: development
    ports:
      - '3000:3000'
    command: >
      node -e "
        require('http').createServer((_, r) => {
          r.writeHead(200, {'Content-Type': 'application/json'});
          r.end(JSON.stringify({status: 'ok', service: 'api-gateway'}));
        }).listen(3000, () => console.log('api-gateway stub listening on :3000'));
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    image: node:20-alpine
    container_name: ai-platform-auth-service
    restart: unless-stopped
    environment:
      PORT: '3001'
      SERVICE_NAME: auth-service
      NODE_ENV: development
    ports:
      - '3001:3001'
    command: >
      node -e "
        require('http').createServer((_, r) => {
          r.writeHead(200, {'Content-Type': 'application/json'});
          r.end(JSON.stringify({status: 'ok', service: 'auth-service'}));
        }).listen(3001, () => console.log('auth-service stub listening on :3001'));
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    image: node:20-alpine
    container_name: ai-platform-user-service
    restart: unless-stopped
    environment:
      PORT: '3002'
      SERVICE_NAME: user-service
      NODE_ENV: development
    ports:
      - '3002:3002'
    command: >
      node -e "
        require('http').createServer((_, r) => {
          r.writeHead(200, {'Content-Type': 'application/json'});
          r.end(JSON.stringify({status: 'ok', service: 'user-service'}));
        }).listen(3002, () => console.log('user-service stub listening on :3002'));
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  image-service:
    image: node:20-alpine
    container_name: ai-platform-image-service
    restart: unless-stopped
    environment:
      PORT: '3003'
      SERVICE_NAME: image-service
      NODE_ENV: development
    ports:
      - '3003:3003'
    command: >
      node -e "
        require('http').createServer((_, r) => {
          r.writeHead(200, {'Content-Type': 'application/json'});
          r.end(JSON.stringify({status: 'ok', service: 'image-service'}));
        }).listen(3003, () => console.log('image-service stub listening on :3003'));
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    image: node:20-alpine
    container_name: ai-platform-notification-service
    restart: unless-stopped
    environment:
      PORT: '3004'
      SERVICE_NAME: notification-service
      NODE_ENV: development
    ports:
      - '3004:3004'
    command: >
      node -e "
        require('http').createServer((_, r) => {
          r.writeHead(200, {'Content-Type': 'application/json'});
          r.end(JSON.stringify({status: 'ok', service: 'notification-service'}));
        }).listen(3004, () => console.log('notification-service stub listening on :3004'));
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    image: node:20-alpine
    container_name: ai-platform-analytics-service
    restart: unless-stopped
    environment:
      PORT: '3005'
      SERVICE_NAME: analytics-service
      NODE_ENV: development
    ports:
      - '3005:3005'
    command: >
      node -e "
        require('http').createServer((_, r) => {
          r.writeHead(200, {'Content-Type': 'application/json'});
          r.end(JSON.stringify({status: 'ok', service: 'analytics-service'}));
        }).listen(3005, () => console.log('analytics-service stub listening on :3005'));
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  image-worker:
    image: node:20-alpine
    container_name: ai-platform-image-worker
    restart: unless-stopped
    environment:
      SERVICE_NAME: image-worker
      NODE_ENV: development
    command: >
      node -e "
        console.log('image-worker stub: listening for BullMQ jobs...');
        setInterval(() => {}, 60000);
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── AI Service (Python stub) ──────────────────────────────────────────────

  ai-service:
    image: python:3.11-alpine
    container_name: ai-platform-ai-service
    restart: unless-stopped
    environment:
      PORT: '8000'
      SERVICE_NAME: ai-service
    ports:
      - '8000:8000'
    command: ["python3", "-m", "http.server", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
