version: '3.9'

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ai-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d aiplatform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO — local S3-compatible object storage ───────────────────────────
  # API:     http://localhost:9000  (use as AWS_ENDPOINT_URL in .env files)
  # Console: http://localhost:9001  (login: minioadmin / minioadmin)

  minio:
    image: minio/minio:latest
    container_name: ai-platform-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the buckets and sets them to public on first start
  minio-init:
    image: minio/mc:latest
    container_name: ai-platform-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/dev-ai-images-generated &&
        mc mb --ignore-existing local/dev-ai-images-uploads &&
        mc anonymous set public local/dev-ai-images-generated &&
        mc anonymous set public local/dev-ai-images-uploads &&
        echo 'MinIO buckets ready.'
      "

  # ─── Node.js services run locally with pnpm dev (not in Docker) ──────────────
  # Start them with:
  #   pnpm dev --filter=@ai-platform/auth-service
  #   pnpm dev --filter=@ai-platform/api-gateway
  #   pnpm dev --filter=@ai-platform/web
  #   pnpm dev --filter=@ai-platform/image-service
  #   pnpm dev --filter=@ai-platform/image-worker

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
