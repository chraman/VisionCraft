version: '3.9'

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ai-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d aiplatform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Node.js services run locally with pnpm dev (not in Docker) ──────────────
  # Start them with:
  #   pnpm dev --filter=@ai-platform/auth-service
  #   pnpm dev --filter=@ai-platform/api-gateway
  #   pnpm dev --filter=@ai-platform/web

  # ─── AI Service (Python stub) ──────────────────────────────────────────────

  ai-service:
    image: python:3.11-alpine
    container_name: ai-platform-ai-service
    restart: unless-stopped
    environment:
      PORT: '8000'
      SERVICE_NAME: ai-service
    ports:
      - '8000:8000'
    command: ["python3", "-m", "http.server", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
