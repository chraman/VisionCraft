name: Deploy QA

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  PNPM_VERSION: 10.30.1
  NODE_VERSION: '20'

jobs:
  # ─── Detect what changed ─────────────────────────────────────────────────
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      packages: ${{ steps.filter.outputs.packages }}
      ai_service: ${{ steps.filter.outputs.ai_service }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'services/**'
              - 'workers/**'
              - 'packages/types/**'
              - 'packages/utils/**'
              - 'packages/config/**'
            frontend:
              - 'apps/web/**'
              - 'apps/admin/**'
              - 'packages/ui/**'
              - 'packages/store/**'
              - 'packages/api-client/**'
              - 'packages/feature-flags/**'
              - 'packages/types/**'
              - 'packages/utils/**'
            packages:
              - 'packages/**'
            ai_service:
              - 'ai-service/**'
            infra:
              - 'infra/**'
              - 'prisma/**'

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build all services
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.packages == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --parallel

      - name: Build
        run: pnpm turbo build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  # ─── Deploy backend → Railway QA ─────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Railway QA
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.packages == 'true' || github.event_name == 'workflow_dispatch'
    environment: qa
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Railway CLI
        run: pnpm add -g @railway/cli@latest

      # All `railway up` commands run from the repo root so the full monorepo
      # is uploaded. Railway then CDs into each service's configured Root Directory
      # (services/<name>) before running the build command, which uses
      # `cd ../..` to navigate back to the monorepo root for pnpm/turbo.
      - name: Deploy auth-service
        run: railway up --service auth-service --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy api-gateway
        run: railway up --service api-gateway --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy user-service
        run: railway up --service user-service --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy image-service
        run: railway up --service image-service --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy notification-service
        run: railway up --service notification-service --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy analytics-service
        run: railway up --service analytics-service --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployments to become healthy
        # Poll the api-gateway health endpoint (public-facing) — if it responds,
        # auth-service (its dependency) is also up.
        run: |
          echo "Waiting for api-gateway to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RAILWAY_QA_API_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "api-gateway is healthy."
              exit 0
            fi
            echo "  attempt $i: HTTP $STATUS — retrying in 10s"
            sleep 10
          done
          echo "ERROR: api-gateway did not become healthy within 5 minutes."
          exit 1

  # ─── Run DB migrations + seed ─────────────────────────────────────────────
  migrate-and-seed:
    name: Migrate & seed QA database
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-backend]
    if: |
      always() &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch')
    environment: qa
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations against QA database
        working-directory: services/auth-service
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_QA_DATABASE_URL }}

      - name: Generate Prisma client for seed script
        working-directory: services/auth-service
        run: pnpm prisma generate
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_QA_DATABASE_URL }}

      - name: Seed QA database with test accounts
        working-directory: infra/scripts
        run: pnpm seed
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_QA_DATABASE_URL }}

  # ─── Deploy frontend → Vercel QA ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Vercel QA
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.packages == 'true' || github.event_name == 'workflow_dispatch'
    environment: qa
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment (qa)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel QA
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed frontend to: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─── E2E tests against live QA ────────────────────────────────────────────
  e2e:
    name: E2E tests — QA
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate-and-seed, deploy-frontend]
    if: |
      always() &&
      (needs.migrate-and-seed.result == 'success' || needs.migrate-and-seed.result == 'skipped') &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') &&
      (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.packages == 'true' || github.event_name == 'workflow_dispatch')
    environment: qa
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run E2E tests against QA
        run: pnpm test:e2e
        env:
          # When deploy-frontend was skipped, fall back to the existing QA URL.
          BASE_URL: ${{ needs.deploy-frontend.outputs.url || secrets.RAILWAY_QA_FRONTEND_URL }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
