name: Deploy QA

on:
  push:
    branches: [qa]
  workflow_dispatch:

env:
  PNPM_VERSION: 10.30.1
  NODE_VERSION: '20'

jobs:
  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build all services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --parallel

      - name: Build
        run: pnpm turbo build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  # ─── Deploy backend → Railway QA ─────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Railway QA
    runs-on: ubuntu-latest
    needs: build
    environment: qa
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      # All `railway up` commands run from the repo root so the full monorepo
      # is uploaded. Railway then CDs into each service's configured Root Directory
      # (services/<name>) before running the build command, which uses
      # `cd ../..` to navigate back to the monorepo root for pnpm/turbo.
      - name: Deploy auth-service
        run: railway up --service auth-service --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy api-gateway
        run: railway up --service api-gateway --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy user-service
        run: railway up --service user-service --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy image-service
        run: railway up --service image-service --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy notification-service
        run: railway up --service notification-service --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy analytics-service
        run: railway up --service analytics-service --environment qa --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployments to become healthy
        # Poll the api-gateway health endpoint (public-facing) — if it responds,
        # auth-service (its dependency) is also up.
        run: |
          echo "Waiting for api-gateway to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RAILWAY_QA_API_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "api-gateway is healthy."
              exit 0
            fi
            echo "  attempt $i: HTTP $STATUS — retrying in 10s"
            sleep 10
          done
          echo "ERROR: api-gateway did not become healthy within 5 minutes."
          exit 1

  # ─── Run DB migrations + seed ─────────────────────────────────────────────
  migrate-and-seed:
    name: Migrate & seed QA database
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: qa
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations against QA database
        working-directory: services/auth-service
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_QA_DATABASE_URL }}

      - name: Generate Prisma client for seed script
        working-directory: services/auth-service
        run: pnpm prisma generate
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_QA_DATABASE_URL }}

      - name: Seed QA database with test accounts
        working-directory: infra/scripts
        run: pnpm seed
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_QA_DATABASE_URL }}

  # ─── Deploy frontend → Vercel QA ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Vercel QA
    runs-on: ubuntu-latest
    needs: build
    environment: qa
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (qa)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel QA
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed frontend to: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─── E2E tests against live QA ────────────────────────────────────────────
  e2e:
    name: E2E tests — QA
    runs-on: ubuntu-latest
    needs: [migrate-and-seed, deploy-frontend]
    environment: qa
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run E2E tests against QA
        run: pnpm test:e2e
        env:
          # Points Playwright at the live QA frontend — webServer is skipped when this is set.
          BASE_URL: ${{ needs.deploy-frontend.outputs.url }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
