name: Deploy QA

on:
  push:
    branches: [qa]
  workflow_dispatch:

permissions:
  id-token: write  # GitHub OIDC — required to assume IAM role
  contents: read

env:
  PNPM_VERSION: 10.30.1
  NODE_VERSION: '20'
  AWS_REGION: us-east-1

jobs:
  # ─── Build & typecheck ────────────────────────────────────────────────────
  build:
    name: Build all packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --parallel

      - name: Build
        run: pnpm turbo build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  # ─── Build & push Docker images to ECR ───────────────────────────────────
  build-and-push:
    name: Build & push — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: build
    environment: qa
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: api-gateway,          dockerfile: services/api-gateway/Dockerfile }
          - { name: auth-service,         dockerfile: services/auth-service/Dockerfile }
          - { name: user-service,         dockerfile: services/user-service/Dockerfile }
          - { name: image-service,        dockerfile: services/image-service/Dockerfile }
          - { name: notification-service, dockerfile: services/notification-service/Dockerfile }
          - { name: analytics-service,    dockerfile: services/analytics-service/Dockerfile }
          - { name: image-worker,         dockerfile: workers/image-worker/Dockerfile }
          - { name: ai-service,           dockerfile: ai-service/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/visioncraft-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service.name }}
        env:
          IMAGE_URI: ${{ secrets.ECR_REGISTRY }}/visioncraft/${{ matrix.service.name }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ECR_REGISTRY }}/visioncraft/${{ matrix.service.name }}:latest
        run: |
          docker build \
            -f ${{ matrix.service.dockerfile }} \
            -t "$IMAGE_URI" \
            -t "$IMAGE_LATEST" \
            .
          docker push "$IMAGE_URI"
          docker push "$IMAGE_LATEST"

  # ─── Deploy frontend to S3 + CloudFront ──────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    environment: qa
    outputs:
      url: https://${{ steps.cf-domain.outputs.domain }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/visioncraft-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend (QA mode)
        run: pnpm turbo build:qa --filter=@ai-platform/web
        env:
          VITE_APP_ENV: qa
          VITE_API_BASE_URL: ${{ secrets.VITE_API_URL_QA }}
          VITE_LAUNCHDARKLY_CLIENT_KEY: ${{ secrets.VITE_LAUNCHDARKLY_CLIENT_KEY_QA }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Sync to S3
        run: |
          aws s3 sync apps/web/dist/ s3://${{ secrets.S3_FRONTEND_BUCKET_QA }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp apps/web/dist/index.html s3://${{ secrets.S3_FRONTEND_BUCKET_QA }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID_QA }} \
            --paths "/index.html"

      - name: Get CloudFront domain
        id: cf-domain
        run: |
          DOMAIN=$(aws cloudfront get-distribution \
            --id ${{ secrets.CF_DISTRIBUTION_ID_QA }} \
            --query 'Distribution.DomainName' --output text)
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "Frontend deployed to: https://$DOMAIN"

  # ─── Rolling deploy to ECS ────────────────────────────────────────────────
  deploy-services:
    name: Deploy ${{ matrix.service }} → ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: qa
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - image-service
          - notification-service
          - analytics-service
          - image-worker
          - ai-service
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/visioncraft-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definition image
        id: task-def
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition visioncraft-qa-${{ matrix.service }} \
            --query 'taskDefinition' --output json)

          # Update container image to new SHA
          NEW_IMAGE="${{ secrets.ECR_REGISTRY }}/visioncraft/${{ matrix.service }}:${{ github.sha }}"
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg image "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $image |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition revision
          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$NEW_REVISION" >> $GITHUB_OUTPUT

      - name: Deploy to ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_QA }} \
            --service ${{ matrix.service }} \
            --task-definition ${{ steps.task-def.outputs.task_def_arn }} \
            --force-new-deployment

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER_QA }} \
            --services ${{ matrix.service }}

  # ─── Health check ─────────────────────────────────────────────────────────
  health-check:
    name: Health check — api-gateway
    runs-on: ubuntu-latest
    needs: [deploy-services, deploy-frontend]
    environment: qa
    steps:
      - name: Poll ALB health endpoint
        run: |
          echo "Polling ${{ secrets.ALB_QA_URL }}/health ..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.ALB_QA_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "api-gateway is healthy (HTTP 200)."
              exit 0
            fi
            echo "  attempt $i/20: HTTP $STATUS — retrying in 15s"
            sleep 15
          done
          echo "ERROR: api-gateway did not return 200 within 5 minutes."
          exit 1

  # ─── Migrate & seed ───────────────────────────────────────────────────────
  migrate-and-seed:
    name: Migrate & seed QA database
    runs-on: ubuntu-latest
    needs: health-check
    environment: qa
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/visioncraft-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Run prisma migrate deploy (ECS one-off task)
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER_QA }} \
            --task-definition visioncraft-qa-migration \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_PRIVATE_SUBNET_QA }}],securityGroups=[${{ secrets.ECS_APP_SG_QA }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"auth-service","command":["sh","-c","pnpm prisma migrate deploy"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ secrets.ECS_CLUSTER_QA }} --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ secrets.ECS_CLUSTER_QA }} \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "ERROR: Migration task exited with code $EXIT_CODE"
            exit 1
          fi
          echo "Migration completed successfully."

      - name: Seed test accounts (ECS one-off task)
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER_QA }} \
            --task-definition visioncraft-qa-migration \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_PRIVATE_SUBNET_QA }}],securityGroups=[${{ secrets.ECS_APP_SG_QA }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"auth-service","command":["sh","-c","cd /repo && pnpm --filter=@ai-platform/scripts seed"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Seed task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ secrets.ECS_CLUSTER_QA }} --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ secrets.ECS_CLUSTER_QA }} \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "ERROR: Seed task exited with code $EXIT_CODE"
            exit 1
          fi
          echo "Seeding completed successfully."

  # ─── E2E tests ────────────────────────────────────────────────────────────
  e2e:
    name: E2E tests — Playwright
    runs-on: ubuntu-latest
    needs: [migrate-and-seed, deploy-frontend]
    environment: qa
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run E2E tests against QA
        run: pnpm test:e2e
        env:
          BASE_URL: ${{ needs.deploy-frontend.outputs.url }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
