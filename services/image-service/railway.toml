[build]
builder = "nixpacks"
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm turbo build --filter=@ai-platform/image-service"
watchPatterns = ["services/image-service/**", "packages/**", "pnpm-lock.yaml", "turbo.json"]

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
