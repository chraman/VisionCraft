[build]
builder = "nixpacks"
installCommand = "cd ../.. && corepack enable && pnpm install --frozen-lockfile"
buildCommand = "cd ../.. && pnpm turbo build --filter=@ai-platform/analytics-service"
watchPatterns = ["services/analytics-service/**", "packages/**", "pnpm-lock.yaml", "turbo.json"]

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
